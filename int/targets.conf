# the single source of truth for the integration matrix.
#
# every executable target is one row; both the harness (run-mode lookup) and CI
# (matrix generation, via lib/ci-matrix.sh) read this file. adding a target is one
# row here and touches no workflow.
#
# columns (whitespace-separated):
#   name      the `mach --target` name, also the harness/CI leg identifier
#   runner    the GitHub Actions runner label the leg executes on
#   run-mode  native (run the binary directly) | qemu (run under qemu-user)
#   cadence   pr (every pull request) | main (on merge to main)
#
# name           runner            run-mode  cadence
linux            ubuntu-latest     native    pr
linux-arm64      ubuntu-24.04-arm  native    pr
linux-riscv64    ubuntu-latest     qemu      pr
windows          windows-latest    native    pr
# x86_64-darwin runs on apple-silicon macos-14 under Rosetta 2, mirroring cd.yml:
# intel macos-13 runners are queue-starved and never dispatch (#1787)
darwin-x86_64    macos-14          native    main
darwin-aarch64   macos-14          native    main
