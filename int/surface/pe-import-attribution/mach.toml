[project]
id = "case"
name = "case"
description = "integration test fixture"
version = "0.0.0"
src = "src"
out = "out/{target.name}/{profile.name}"

[target.windows]
isa = "x86_64"
os  = "windows"
abi = "win64"

[profile.debug]
opt = 0

[profile.release]
opt = 2

[artifact.case]
kind = "bin"
entry = "main.mach"
out = "bin/case"
targets = ["*"]
link = ["kernel32"]

[link.kernel32]
source = "system"
name = "kernel32.dll"
os = ["windows"]
