# build the ELF executable with --pie on the linux leg and inspect its e_type
# host-side: ET_DYN (3) proves the optional position-independent path is taken,
# while the default (no --pie) stays ET_EXEC. structural only - the relocated-pointer
# runtime is exercised by the exec guard, which needs the self-relocating mach-std.
# the PT_GNU_RELRO hardening is guarded separately by the elf-relro case.
run: field
targets: linux
build-target: linux
build-flags: --pie
