# build the ELF executable with --pie on the linux leg and inspect its header
# host-side: ET_DYN (3) proves the optional position-independent path is taken (the
# default, no --pie, stays ET_EXEC), and the PT_GNU_RELRO header (relro=1) proves the
# relocated read-only data is routed into a re-protectable RELRO region. structural
# only - the runtime re-protection is exercised by mach-std's self-relocating startup.
# a dedicated elf-relro case guards RELRO on user-authored `val` pointer constants.
run: field
targets: linux
build-target: linux
build-flags: --pie
