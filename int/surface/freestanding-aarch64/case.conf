# build-only: cross-build the os=freestanding, of=raw aarch64 flat image on the
# cheap linux leg and assert it emitted. `mach info targets` advertises
# freestanding-aarch64 and select_of accepts it, so the emit path for exactly this
# combination (aarch64 codegen + raw writer + freestanding entry-at-base) must not
# regress; no aarch64 runner is needed since the image is not executed.
run: built
targets: linux
build-target: freestanding-aarch64
