# build the ELF executable with --pie on the linux leg and inspect its header
# host-side: the program's read-only data holds relocated constant pointers (a `val`
# pointer table and a `val` function-pointer table), which the linker routes into a
# PT_GNU_RELRO region. relro=1 proves the region is emitted; ET_DYN (3) proves the
# --pie path. structural only - the runtime re-protection (mprotect after self-reloc)
# needs the self-relocating mach-std and is exercised by the pie-reloc exec guard.
run: field
targets: linux
build-target: linux
build-flags: --pie
