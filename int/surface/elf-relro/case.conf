# build the program with --pie on each no-libc linux ELF leg and inspect its program
# headers host-side: the read-only data holds relocated constant pointers (a `val`
# pointer table and a `val` function-pointer table), which the linker routes into a
# PT_GNU_RELRO region. relro=1 proves the region is emitted, per-ISA (the emission is
# ISA-generic, so all three legs are covered). structural only - the runtime
# re-protection (mprotect after self-reloc) is exercised by the pie-reloc exec guard.
run: relro
targets: linux linux-arm64 linux-riscv64
build-flags: --pie
