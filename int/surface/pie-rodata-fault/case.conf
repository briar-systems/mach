# build the program with --pie and RUN it: the pure-constant sibling of pie-relro-fault.
# the program writes to a string literal's bytes, which live in pure `.rodata` - data
# with no base relocation, so #1844 maps it read-only from process start (it is never
# routed through the writable RELRO region). the write therefore raises SIGSEGV (exit
# 139) independently of the runtime re-protection; the producer reports
# rodata_write=faulted. scoped to the no-libc linux ELF arches (riscv64 under qemu). the
# golden is target-independent, so it is shared across the legs.
run: rodata-fault
targets: linux linux-arm64 linux-riscv64
build-flags: --pie
