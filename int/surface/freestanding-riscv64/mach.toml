[project]
id = "case"
name = "case"
description = "integration test fixture"
version = "0.0.0"
src = "src"
out = "out/{target.name}/{profile.name}"

[target.freestanding-riscv64]
isa = "riscv64"
os  = "freestanding"
abi = "lp64"

[profile.debug]
opt = 0

[profile.release]
opt = 2

[artifact.case]
kind = "bin"
entry = "main.mach"
out = "bin/case"
targets = ["*"]
