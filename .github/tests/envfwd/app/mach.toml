[project]
id      = "envfwd"
version = "0.1.0"
src     = "src"
dep     = "dep"
target  = "native"
out     = "out/{target}/bin/{name}{ext}"
obj     = "out/{target}/obj"
ir      = "out/{target}/ir"
asm     = "out/{target}/asm"
tests   = "out/{target}/test/{name}"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.envfwd]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "v0.6.0"
