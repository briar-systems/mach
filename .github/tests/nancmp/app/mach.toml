[project]
id      = "nancmp"
name    = "IEEE-754 NaN float-comparison test — App"
version = "0.0.0"
src     = "src"
dep     = "dep"
target  = "native"
out     = "out/{target}/bin/{name}"
obj     = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[bin.nancmp]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/main"
