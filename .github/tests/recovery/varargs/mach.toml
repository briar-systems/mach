[project]
id      = "recvarargs"
name    = "recovery: removed C-style varargs — no parse cascade"
version = "0.0.0"
src     = "src"
out     = "out/{target}/{profile}/bin/{name}{ext}"
obj     = "out/{target}/{profile}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.rec]
entry = "main.mach"
