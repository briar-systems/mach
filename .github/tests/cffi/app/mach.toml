[project]
id = "cffiapp"
name = "SysV float-aggregate C-FFI — App"
version = "0.0.0"
dir_src = "src"
dir_out = "out"
dir_dep = "dep"
target = "linux"

[targets.linux]
os = "linux"
isa = "x86_64"
abi = "sysv64"
mode = "executable"
entrypoint = "main.mach"
artifacts = "linux"
binary = "linux/bin/cffiapp"

[deps.mach-std]
type = "remote"
path = "https://github.com/octalide/mach-std"
version = "branch/dev"
