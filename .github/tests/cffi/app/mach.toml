[project]
id = "cffiapp"
name = "SysV float-aggregate C-FFI — App"
version = "0.0.0"
src = "src"
dep = "dep"
target = "linux"
out = "out/{target}/bin/{name}{ext}"
obj = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.cffiapp]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
