[project]
id = "ctrootsv1"
name = "Comptime roots — v1 manifest"
version = "2.4.6"
dir_src = "src"
dir_out = "out"
dir_dep = "dep"
target = "native"

[targets.linux]
os = "linux"
isa = "x86_64"
abi = "sysv64"
mode = "executable"
entrypoint = "main.mach"
artifacts = "linux"
binary = "linux/bin/ctrootsv1"

[deps.mach-std]
type = "remote"
path = "https://github.com/octalide/mach-std"
version = "branch/dev"
