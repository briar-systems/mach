[project]
id      = "ctrootsv2"
name    = "Comptime roots — v2 manifest"
version = "3.1.4"
src     = "src"
dep     = "dep"
target  = "native"
out     = "out/{target}/{profile}/bin/{name}{ext}"
obj     = "out/{target}/{profile}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.roots]
entry = "main.mach"

[profile.debug]
opt = "O0"

[profile.release]
opt = "O2"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "v0.4.0"
