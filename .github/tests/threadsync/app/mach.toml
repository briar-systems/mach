[project]
id = "threadsync"
name = "win64 trailing PE import-descriptor call-thunk regression — App"
version = "0.0.0"
src = "src"
dep = "dep"
target = "windows"
out = "out/{target}/bin/{name}{ext}"
obj = "out/{target}/obj"

[target.windows]
isa  = "x86_64"
os   = "windows"
abi  = "win64"
ext  = ".exe"

[bin.threadsync]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
