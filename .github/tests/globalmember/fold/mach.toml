[project]
id = "gmemberfold"
name = "Global member fold — module-qualified constant paths fold in global initialisers (#1290)"
version = "0.0.0"
dir_src = "src"
dir_out = "out"
dir_dep = "dep"
target = "native"

[targets.linux]
os = "linux"
isa = "x86_64"
abi = "sysv64"
mode = "executable"
entrypoint = "main.mach"
artifacts = "linux"
binary = "linux/bin/gmemberfold"

[deps.mach-std]
type = "remote"
path = "https://github.com/octalide/mach-std"
version = "branch/dev"
