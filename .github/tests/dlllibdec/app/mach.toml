[project]
id      = "dlllibdec"
name    = "per-symbol windows DLL attribution via decorators — App"
version = "0.0.0"
src     = "src"
dep     = "dep"
target  = "windows"
out     = "out/{target}/bin/{name}{ext}"
obj     = "out/{target}/obj"

[target.windows]
isa  = "x86_64"
os   = "windows"
abi  = "win64"
ext  = ".exe"
libs = ["kernel32.dll", "ws2_32.dll", "advapi32.dll"]

[bin.dlllibdec]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
