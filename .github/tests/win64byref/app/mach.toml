[project]
id = "win64byref"
name = "win64 byref 5th-arg regression — App"
version = "0.0.0"
dir_src = "src"
dir_out = "out"
dir_dep = "dep"
target = "windows"

[targets.windows]
os = "windows"
isa = "x86_64"
abi = "win64"
mode = "executable"
entrypoint = "main.mach"
artifacts = "windows"
binary = "windows/bin/win64byref.exe"
libs = ["kernel32.dll"]

[deps.mach-std]
type = "remote"
path = "https://github.com/octalide/mach-std"
version = "branch/dev"
