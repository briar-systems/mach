[project]
id = "optapp"
name = "Per-target Opt Test — App"
version = "0.0.0"
src = "src"
dep = "dep"
target = "native"
out = "out/{target}/bin/{name}{ext}"
obj = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.optapp]
entry = "main.mach"

[profile.release]
opt = 2

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
