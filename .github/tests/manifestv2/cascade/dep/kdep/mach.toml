# kdep: a v2-format dependency declaring its own windows link requirement. a
# consumer building the windows tuple inherits kernel32.dll without naming it.
[project]
id      = "kdep"
version = "0.1.0"
src     = "src"

[target.windows]
isa  = "x86_64"
os   = "windows"
abi  = "win64"
libs = ["kernel32.dll"]

[lib.kdep]
entry = "lib.mach"
