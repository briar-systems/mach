[project]
id      = "demo"
version = "0.1.0"
src     = "src"
dep     = "dep"
target  = "native"
out     = "out/{target}/{profile}/bin/{name}{ext}"
obj     = "out/{target}/{profile}/obj"
ir      = "out/{target}/{profile}/ir"
asm     = "out/{target}/{profile}/asm"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.windows]
isa  = "x86_64"
os   = "windows"
abi  = "win64"
ext  = ".exe"
libs = ["kernel32.dll"]

[bin.hello]
entry = "hello.mach"

[bin.bye]
entry = "bye.mach"

[profile.debug]
opt = "O0"

[profile.release]
opt     = "O2"
emit_ir = true

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "v0.4.0"
