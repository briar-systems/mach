[project]
id = "relverify"
name = "release --verify-ir regression — App"
version = "0.0.0"
src = "src"
target = "linux"
out = "out/{target}/bin/{name}{ext}"
obj = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[lib.relverify]
entry = "main.mach"
kind  = "static"

[profile.debug]
opt = 0

[profile.release]
opt = 2
