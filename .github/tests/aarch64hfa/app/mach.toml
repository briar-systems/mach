[project]
id      = "aarch64hfa"
name    = "AAPCS64 HFA/HVA float-aggregate passing — App"
version = "0.0.0"
src     = "src"
dep     = "dep"
target  = "linux-arm64"
out     = "out/{target}/bin/{name}{ext}"
obj     = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[bin.aarch64hfa]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
