[project]
id      = "aarch64enc"
name    = "aarch64 encode/reloc byte-verification — App"
version = "0.0.0"
src     = "src"
target  = "arm64"
out     = "out/{target}/bin/{name}{ext}"
obj     = "out/{target}/obj"

[target.arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[bin.aarch64enc]
entry = "main.mach"
