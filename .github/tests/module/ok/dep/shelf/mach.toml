# shelf: a library whose own module re-exports the gfx module through a bare
# project-id `fwd gfx;`. gfx is a sibling dep of the consumer, so the bare id
# resolves against the consumer's flat dep set.
[project]
id      = "shelf"
version = "0.1.0"
src     = "src"
module  = "shelf.mach"

[lib.shelf]
entry = "shelf.mach"
