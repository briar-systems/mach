# a declared [project].module that names no file is a manifest error at build
# start, imported or not — the entry below never imports it (#1326).
[project]
id      = "dangapp"
version = "0.1.0"
src     = "src"
module  = "ghost.mach"
target  = "native"
out     = "out/{target}/{profile}/bin/{name}{ext}"
obj     = "out/{target}/{profile}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.dangapp]
entry = "main.mach"

[profile.debug]
opt = 0
