[project]
id      = "ctdispatch-unhandled"
name    = "Comptime dispatch — statement-position $error on an unhandled type"
version = "1.0.0"
src     = "src"
dep     = "dep"
target  = "native"
out     = "out/{target}/bin/{name}{ext}"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.unhandled]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "v0.12.0"
