[project]
id      = "eachfields"
version = "0.1.0"
src     = "src"
dep     = "dep"
target  = "native"
out     = "out/{target}/bin/{name}{ext}"
obj     = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.eachfields]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/main"
