[project]
id      = "aarch64run"
name    = "aarch64 f64 memory-load run smoke — App"
version = "0.0.0"
src     = "src"
dep     = "dep"
target  = "linux-arm64"
out     = "out/{target}/bin/{name}{ext}"
obj     = "out/{target}/obj"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[bin.aarch64run]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
