[project]
id = "literalboundary"
version = "0.0.0"
src = "src"
dep = "dep"
target = "linux"
out = "out/{target}/bin/{name}{ext}"
obj = "out/{target}/obj"
ir = "out/{target}/ir"
asm = "out/{target}/asm"
tests = "out/{target}/test/{name}"

[target.linux]
isa = "x86_64"
os = "linux"
abi = "sysv64"

[bin.literalboundary]
entry = "src/main.mach"

[profile.debug]
opt = 0

[profile.release]
opt = 2

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
