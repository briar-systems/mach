[project]
id = "kwidentprog"
name = "Contextual keyword used as identifier (#1458)"
version = "0.0.0"
src = "src"
dep = "dep"
target = "native"
out = "out/{target}/bin/{name}{ext}"
obj = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.kwidentprog]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
