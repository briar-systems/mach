[project]
id = "nilfunfold"
name = "Nil into fun — explicit nil-init of fun-typed globals folds (#1369)"
version = "0.0.0"
src = "src"
dep = "dep"
target = "native"
out = "out/{target}/bin/{name}{ext}"
obj = "out/{target}/obj"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[bin.nilfunfold]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/dev"
