name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

# a tagged push builds the release binary for each target — on its native host, or
# under emulation where no practical native runner exists — each to its own
# self-host fixpoint, then publishes the archives + SHA256SUMS. correctness is CI's
# job — every change reaches main through a PR it gates.
#
# darwin has no prior release to self-seed from, so seed-darwin cross-builds the
# stage-0 seed on linux first; collapse that bootstrap once a darwin archive ships.
# both darwin archives build on macos-14 (apple silicon): aarch64-darwin natively
# and x86_64-darwin under Rosetta 2 — Intel macos-13 runners are queue-starved, and
# the cross-built x86_64 seed bakes in x86_64-darwin as its host, so its
# under-Rosetta a/b/c fixpoint stays self-hosted on the arm64 box.
#
# workflow_dispatch runs the darwin lane (seed + native fixpoint + self-test) on a
# branch with no tag, so on-Mac validation needs no release; the tag-verify and
# publish steps are gated to tag pushes and stay skipped on dispatch.
jobs:
  verify:
    name: verify tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: tag matches mach.toml version
        run: |
          set -euo pipefail
          ver="$(sed -n 's/^version = "\(.*\)"$/\1/p' mach.toml | head -1)"
          [ "v$ver" = "$GITHUB_REF_NAME" ] || { echo "::error::tag $GITHUB_REF_NAME != mach.toml version $ver"; exit 1; }

  build-linux:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
            seed: mach-*-x86_64-linux.tar.gz
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
            seed: mach-*-aarch64-linux.tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build fixpoint
        run: |
          set -euo pipefail
          mach dep pull
          mach build . --profile release -o a
          ./a build . --profile release -o b
          ./b build . --profile release -o c

          # ship the fixpoint: b == c (stage2 vs stage3) or the build is non-deterministic
          if ! cmp -s b c; then
            echo "::error::build did not converge to the fixpoint"
            exit 1
          fi

      - name: package archive
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p dist stage
          cp c stage/mach
          cp LICENSE stage/
          tar -C stage -czf "dist/mach-$ver-$TARGET.tar.gz" mach LICENSE

      - name: upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/mach-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
            seed: mach-*-x86_64-windows.zip
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          $seed = Join-Path $env:RUNNER_TEMP 'seed'
          New-Item -ItemType Directory -Path $seed -Force | Out-Null
          gh release download -R $env:GITHUB_REPOSITORY -p $env:SEED -D $seed
          $zip = Get-ChildItem -Path $seed -Filter $env:SEED | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $seed -Force
          Add-Content -Path $env:GITHUB_PATH -Value $seed

      - name: build fixpoint
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mach.exe build . --profile release -o a.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./a.exe build . --profile release -o b.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./b.exe build . --profile release -o c.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # ship the fixpoint: b == c (stage2 vs stage3) or the build is non-deterministic
          if ((Get-FileHash b.exe).Hash -ne (Get-FileHash c.exe).Hash) {
            Write-Error 'build did not converge to the fixpoint'
            exit 1
          }

      - name: package archive
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $ver = ($env:GITHUB_REF_NAME).TrimStart('v')
          New-Item -ItemType Directory -Path dist, stage -Force | Out-Null
          Copy-Item c.exe stage/mach.exe -Force
          Copy-Item LICENSE stage/ -Force
          Compress-Archive -Path stage/mach.exe, stage/LICENSE -DestinationPath "dist/mach-$ver-${env:TARGET}.zip" -Force

      - name: upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/mach-*-${{ matrix.target }}.zip
          if-no-files-found: error
          retention-days: 1

  # bootstrap: no prior darwin release exists to seed the native fixpoint, so
  # cross-build the stage-0 seed on linux and hand it to the macOS runner. retire
  # this once the first darwin archive ships and build-darwin can self-seed like
  # every other target.
  seed-darwin:
    name: seed ${{ matrix.target }}
    needs: verify
    if: ${{ !cancelled() && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            triple: darwin-aarch64
          - target: x86_64-darwin
            triple: darwin-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: mach-*-x86_64-linux.tar.gz
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: cross-build the darwin seed
        env:
          TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail
          mach dep pull
          mach build . -o m
          ./m build . --target "$TRIPLE" --profile release -o mach-darwin-seed

      - name: upload seed
        uses: actions/upload-artifact@v4
        with:
          name: seed-${{ matrix.target }}
          path: mach-darwin-seed
          if-no-files-found: error
          retention-days: 1

  build-darwin:
    name: build ${{ matrix.target }}
    needs: seed-darwin
    # explicit, since the default success() skips through verify's dispatch-skip
    if: ${{ !cancelled() && needs.seed-darwin.result == 'success' }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-darwin
            runs-on: macos-14
          # x86_64-darwin: an Intel Mach-O run on the arm64 box via Rosetta 2. the
          # cross-built seed bakes in x86_64-darwin as its host, so the whole a/b/c
          # fixpoint emits Intel binaries and self-hosts under Rosetta.
          - target: x86_64-darwin
            runs-on: macos-14
            rosetta: true
    steps:
      - uses: actions/checkout@v6

      - name: download the darwin seed
        uses: actions/download-artifact@v4
        with:
          name: seed-${{ matrix.target }}
          path: seed

      # the x86_64-darwin seed and its fixpoint are Intel Mach-O; the arm64 runner
      # executes them through Rosetta 2, which is deterministic, so b == c holds.
      - name: install Rosetta 2
        if: ${{ matrix.rosetta }}
        run: softwareupdate --install-rosetta --agree-to-license

      - name: build fixpoint
        run: |
          set -euo pipefail
          chmod +x seed/mach-darwin-seed

          # stage-0 is the cross-built seed; a/b/c self-host on the macOS runner
          # (arm64 natively, or x86_64 under Rosetta)
          ./seed/mach-darwin-seed dep pull
          ./seed/mach-darwin-seed build . --profile release -o a
          ./a build . --profile release -o b
          ./b build . --profile release -o c

          # ship the fixpoint: b == c (stage2 vs stage3) or the build is non-deterministic
          if ! cmp -s b c; then
            echo "::error::darwin build did not converge to the fixpoint"
            exit 1
          fi

      - name: self test
        run: |
          set -euo pipefail
          # exercises a mach-built darwin binary — arm64 native, or x86_64 under
          # Rosetta — whose ad-hoc signature must hold (no SIGKILL) for the fixpoint
          # and these tests to pass
          ./c test .

      - name: package archive
        if: github.event_name == 'push'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p dist stage
          cp c stage/mach
          cp LICENSE stage/
          tar -C stage -czf "dist/mach-$ver-$TARGET.tar.gz" mach LICENSE

      - name: upload archive
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/mach-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    needs: [build-linux, build-windows, build-darwin]
    # success() keeps the build gate the default if dropped when adding the event check
    if: ${{ github.event_name == 'push' && success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: collect archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum mach-*.tar.gz mach-*.zip > SHA256SUMS

      - name: publish
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/mach-*.tar.gz
            dist/mach-*.zip
            dist/SHA256SUMS
