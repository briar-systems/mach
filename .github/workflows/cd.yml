name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# a tagged push builds the release binary for each target on its native host
# (each to its own self-host fixpoint), then publishes the archives + SHA256SUMS.
# correctness is CI's job — every change reaches main through a PR it gates.
jobs:
  verify:
    name: verify tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: tag matches mach.toml version
        run: |
          set -euo pipefail
          ver="$(sed -n 's/^version = "\(.*\)"$/\1/p' mach.toml | head -1)"
          [ "v$ver" = "$GITHUB_REF_NAME" ] || { echo "::error::tag $GITHUB_REF_NAME != mach.toml version $ver"; exit 1; }

  build-linux:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
            seed: mach-*-x86_64-linux.tar.gz
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
            seed: mach-*-aarch64-linux.tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build fixpoint
        run: |
          set -euo pipefail
          mach dep pull
          mach build . -o a
          ./a build . -o b
          ./b build . -o c

          # ship the fixpoint: b == c (stage2 vs stage3) or the build is non-deterministic
          if ! cmp -s b c; then
            echo "::error::build did not converge to the fixpoint"
            exit 1
          fi

      - name: package archive
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p dist stage
          cp c stage/mach
          cp LICENSE stage/
          tar -C stage -czf "dist/mach-$ver-$TARGET.tar.gz" mach LICENSE

      - name: upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/mach-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-windows:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
            seed: mach-*-x86_64-windows.zip
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          $seed = Join-Path $env:RUNNER_TEMP 'seed'
          New-Item -ItemType Directory -Path $seed -Force | Out-Null
          gh release download -R $env:GITHUB_REPOSITORY -p $env:SEED -D $seed
          $zip = Get-ChildItem -Path $seed -Filter $env:SEED | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $seed -Force
          Add-Content -Path $env:GITHUB_PATH -Value $seed

      - name: build fixpoint
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mach.exe build . -o a.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./a.exe build . -o b.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./b.exe build . -o c.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # ship the fixpoint: b == c (stage2 vs stage3) or the build is non-deterministic
          if ((Get-FileHash b.exe).Hash -ne (Get-FileHash c.exe).Hash) {
            Write-Error 'build did not converge to the fixpoint'
            exit 1
          }

      - name: package archive
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $ver = ($env:GITHUB_REF_NAME).TrimStart('v')
          New-Item -ItemType Directory -Path dist, stage -Force | Out-Null
          Copy-Item c.exe stage/mach.exe -Force
          Copy-Item LICENSE stage/ -Force
          Compress-Archive -Path stage/mach.exe, stage/LICENSE -DestinationPath "dist/mach-$ver-${env:TARGET}.zip" -Force

      - name: upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/mach-*-${{ matrix.target }}.zip
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: collect archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum mach-*.tar.gz mach-*.zip > SHA256SUMS

      - name: publish
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/mach-*.tar.gz
            dist/mach-*.zip
            dist/SHA256SUMS
