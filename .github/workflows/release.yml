name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Verify the tag matches the source version
        run: |
          ver="$(sed -n 's/^version = "\(.*\)"$/\1/p' mach.toml | head -1)"
          if [ "v$ver" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match mach.toml version $ver — tagged the wrong commit?"
            exit 1
          fi

      - name: Fetch seed compiler (most recent release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R ${{ github.repository }} -p mach -D /usr/local/bin
          chmod +x /usr/local/bin/mach

      - name: Build to the fixpoint
        run: |
          set -euo pipefail
          # the most recent release builds the new source, then the result
          # rebuilds itself to the byte-identical fixpoint that ships.
          mach build .;  cp out/linux/bin/mach a;  chmod +x a
          ./a build .;   cp out/linux/bin/mach b;  chmod +x b
          ./b build .
          if ! cmp -s b out/linux/bin/mach; then
            echo "::error::release build did not converge to the fixpoint"
            exit 1
          fi

      - name: Cross-compile the windows target
        run: out/linux/bin/mach build . --target windows

      - name: Smoke-test the windows binary under wine
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 zip
          command -v wine >/dev/null || sudo ln -s "$(command -v wine64)" /usr/local/bin/wine
          # emitted-code smoke: the win64 integration app must build and run.
          bash .github/tests/win64byref/run.sh out/linux/bin/mach
          # compiler smoke: mach.exe itself must build a real project under wine
          # before it ships — a release artifact that cannot compile is not a release.
          work="$(mktemp -d)"
          cp -r .github/tests/win64byref/app "$work/app"
          mkdir -p "$work/app/dep"
          cp -r dep/mach-std "$work/app/dep/mach-std"
          ( cd "$work/app" && WINEDEBUG=-all wine "$GITHUB_WORKSPACE/out/windows/bin/mach.exe" build . )
          WINEDEBUG=-all wine "$work/app/out/windows/bin/win64byref.exe"

      - name: Package artifacts
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          # `mach` is the bootstrap-seed alias (ci.yml / release.yml fetch `-p mach`
          # from the most recent release); the bare per-target names are the legacy
          # public assets, kept until consumers move to the versioned archives (#1352).
          cp out/linux/bin/mach dist/mach
          cp out/linux/bin/mach dist/mach-x86_64-linux
          ( cd out/windows/bin && zip -q "$GITHUB_WORKSPACE/dist/mach-x86_64-windows.zip" mach.exe )
          # versioned archives: the standard format install.sh / install.ps1 consume.
          stage="$(mktemp -d)"
          cp out/linux/bin/mach LICENSE "$stage"
          tar -C "$stage" -czf "dist/mach-$ver-x86_64-linux.tar.gz" mach LICENSE
          rm "$stage/mach"
          cp out/windows/bin/mach.exe "$stage"
          ( cd "$stage" && zip -q "$GITHUB_WORKSPACE/dist/mach-$ver-x86_64-windows.zip" mach.exe LICENSE )
          cp install.sh install.ps1 dist/
          ( cd dist && sha256sum mach-x86_64-linux mach-x86_64-windows.zip \
              "mach-$ver-x86_64-linux.tar.gz" "mach-$ver-x86_64-windows.zip" \
              install.sh install.ps1 > SHA256SUMS )

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mach
            dist/mach-x86_64-linux
            dist/mach-x86_64-windows.zip
            dist/mach-*-x86_64-linux.tar.gz
            dist/mach-*-x86_64-windows.zip
            dist/SHA256SUMS
            dist/install.sh
            dist/install.ps1
