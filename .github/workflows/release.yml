name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build
        run: make

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: out/bin/mach
