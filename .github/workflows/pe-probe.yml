name: PE probe (TEMPORARY #1374)

# temporary diagnostic workflow for #1374: the native windows loader rejects the
# PE the emitter produces (ERROR_BAD_EXE_FORMAT) while wine accepts it. a linux
# job cross-compiles mach.exe + a tiny test exe from this tree; a windows-latest
# job dumps their headers, builds a known-good cl baseline for a field-by-field
# diff, and launches both originals plus structurally-patched variants to bisect
# the violated loader invariant. removed before the PR is marked ready.

on:
  push:
    branches: [fix/1374-pe-loader-conformance]

permissions:
  contents: read

jobs:
  cross:
    name: Cross-compile (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch released mach (build seed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R ${{ github.repository }} -p mach -D /usr/local/bin
          chmod +x /usr/local/bin/mach

      - name: Build the compiler
        run: mach build .

      - name: Cross-compile mach.exe
        run: out/linux/bin/mach build . --target windows

      - name: Cross-compile a tiny test exe
        run: |
          set -euo pipefail
          APP=.github/tests/win64runner/app
          mkdir -p "$APP/dep"
          ln -sfn "$GITHUB_WORKSPACE/dep/mach-std" "$APP/dep/mach-std"
          ( cd "$APP" && "$GITHUB_WORKSPACE/out/linux/bin/mach" build . )
          find "$APP/out" -name '*.exe'
          cp "$APP/out/windows/bin/win64runner.exe" "$GITHUB_WORKSPACE/test.exe"
          cp out/windows/bin/mach.exe "$GITHUB_WORKSPACE/mach.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: pe-exes
          path: |
            mach.exe
            test.exe

  load:
    name: Load + bisect (windows)
    needs: cross
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pe-exes
          path: exes

      - name: Sanity — a known-good exe launches here
        run: |
          $p = Start-Process cmd.exe -ArgumentList '/c ver' -PassThru -Wait -NoNewWindow
          "cmd /c ver exit = $($p.ExitCode)"

      - name: Build a known-good cl baseline + dump its headers
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -SkipAutomaticLocation -DevCmdArguments '-arch=x64'
          Set-Content baseline.c "int main(void){return 7;}"
          cl /nologo /Fe:baseline.exe baseline.c | Out-Host
          "=== baseline.exe launch ==="
          $p = Start-Process .\baseline.exe -PassThru -Wait -NoNewWindow
          "baseline exit = $($p.ExitCode)"
          "=== baseline.exe /headers ==="
          dumpbin /headers /loadconfig baseline.exe | Out-Host

      - name: Dump mach.exe + test.exe headers
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -SkipAutomaticLocation -DevCmdArguments '-arch=x64'
          foreach ($e in 'exes\mach.exe','exes\test.exe') {
            "=== $e /headers /loadconfig ==="
            dumpbin /headers /loadconfig $e | Out-Host
          }

      - name: Launch natively (proof — #1374)
        run: |
          $py = @'
          import subprocess

          def launch(path, args):
              # a structurally-bad PE makes CreateProcess fail with
              # ERROR_BAD_EXE_FORMAT (193) before any code runs. anything that
              # starts cleared the loader's structural gate; its exit code is the
              # program's own.
              try:
                  p = subprocess.Popen([path] + args)
              except OSError as ex:
                  return (False, getattr(ex, "winerror", None),
                          f"{type(ex).__name__}: winerror={getattr(ex,'winerror',None)}")
              try:
                  rc = p.wait(timeout=30)
              except subprocess.TimeoutExpired:
                  p.kill(); return (True, None, "started (timeout)")
              return (True, rc & 0xffffffff, f"started, exit={rc & 0xffffffff:#x}")

          bad = 0

          # the cross-built compiler: `mach info` loads, runs, and exits 0 with its
          # banner — proving the native loader accepts the image (no 193).
          ok, code, msg = launch('exes\\mach.exe', ['info'])
          print(f"mach.exe info  -> {msg}")
          if not ok:
              bad += 1
          elif code != 0:
              print(f"  WARNING: mach info exited {code:#x}, expected 0")
              bad += 1

          # the win64runner test program returns 0 when add(20,22)==42, proving the
          # image not only loads but runs its code to a correct exit.
          ok, code, msg = launch('exes\\test.exe', [])
          print(f"win64runner.exe -> {msg}")
          if not ok:
              bad += 1
          elif code != 0:
              print(f"  WARNING: win64runner exited {code:#x}, expected 0")
              bad += 1

          raise SystemExit(bad)
          '@
          Set-Content -Path probe.py -Value $py -Encoding ascii
          python probe.py
