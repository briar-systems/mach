name: int main

# the darwin legs of the integration matrix run on merge to main (and on manual
# dispatch) rather than per-PR: the macOS runners are scarce, and darwin releases
# are arm64-only, so a from-source compiler for each darwin target has to be
# cross-built on linux first. running at the release-integration gate catches a
# darwin codegen regression there while paying the macOS cost only then. the leg set
# is still data-driven from int/targets.conf (the main-cadence rows), so adding a
# darwin target is one row.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  int-matrix:
    name: int matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - uses: actions/checkout@v6
      - id: gen
        run: echo "include=$(bash int/lib/ci-matrix.sh main)" >> "$GITHUB_OUTPUT"

  # darwin releases are arm64-only (there is no x86_64-darwin seed to self-host
  # from), so the from-source compiler for each darwin target is cross-built on
  # linux from the x86_64-linux seed and handed to the macOS runner. this mirrors
  # the cd.yml darwin bootstrap; collapse it once a darwin archive self-seeds.
  seed:
    name: seed ${{ matrix.target }}
    needs: int-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.int-matrix.outputs.include) }}
    env:
      GH_TOKEN: ${{ github.token }}
      SEED: mach-*-x86_64-linux.tar.gz
    steps:
      - uses: actions/checkout@v6
      - name: cross-build the from-source compiler
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach
          mach dep pull
          mach build . -o m
          ./m build . --target ${{ matrix.target }} --profile release -o mach-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: mach-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 1

  # timeout-minutes bounds execution, not queue time: a leg pinned to an
  # unavailable runner class still sits in queue to GitHub's 24h cap (#1787).
  # keeping every row on an available runner class is the real guard.
  integration:
    name: int ${{ matrix.target }}
    needs: [int-matrix, seed]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.int-matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: mach-${{ matrix.target }}
      - name: run integration suite
        run: |
          set -euo pipefail
          chmod +x mach-${{ matrix.target }}
          bash int/run.sh --target ${{ matrix.target }} ./mach-${{ matrix.target }}
