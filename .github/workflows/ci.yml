name: CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

# every native host gets three checks: "build <target>" proves the most recent
# release (the seed) builds the project to a self-host fixpoint. "test <target>"
# reuses that fixpoint compiler to run the in-source corpus. "release <target>"
# repeats the fixpoint under the opt=2 release profile so -O2 codegen
# regressions surface on PRs, not only at tag time.
jobs:
  build-linux:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
            seed: mach-*-x86_64-linux.tar.gz
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
            seed: mach-*-aarch64-linux.tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build fixpoint
        run: |
          set -euo pipefail

          mach dep pull
          mach build . -o a
          ./a build . -o b
          ./b build . -o c

          # compare b and c to identify non-determinism
          if ! cmp -s b c; then
            echo "::error::build did not converge to the fixpoint"
            exit 1
          fi

          # hand the fixpoint binary to the test job
          mkdir -p artifact
          cp c artifact/mach

      - name: upload fixpoint result
        uses: actions/upload-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact/mach
          if-no-files-found: error
          retention-days: 1

  test-linux:
    name: test ${{ matrix.target }}
    needs: build-linux
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: download the fixpoint result
        uses: actions/download-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact

      - name: self test
        run: |
          set -euo pipefail
          chmod +x artifact/mach
          ./artifact/mach dep pull
          ./artifact/mach test .

  release-linux:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
            seed: mach-*-x86_64-linux.tar.gz
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
            seed: mach-*-aarch64-linux.tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build release fixpoint
        run: |
          set -euo pipefail
          mach dep pull
          mach build . --profile release -o a
          ./a build . --profile release -o b
          ./b build . --profile release -o c

          # the opt=2 compiler must rebuild itself byte-identically
          if ! cmp -s b c; then
            echo "::error::release build did not converge to the fixpoint"
            exit 1
          fi

      - name: self test
        run: |
          set -euo pipefail
          ./c test .

  build-windows:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
            seed: mach-*-x86_64-windows.zip
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          $seed = Join-Path $env:RUNNER_TEMP 'seed'
          New-Item -ItemType Directory -Path $seed -Force | Out-Null
          gh release download -R $env:GITHUB_REPOSITORY -p $env:SEED -D $seed
          $zip = Get-ChildItem -Path $seed -Filter $env:SEED | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $seed -Force
          Add-Content -Path $env:GITHUB_PATH -Value $seed

      - name: build fixpoint
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mach.exe build . -o a.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./a.exe build . -o b.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./b.exe build . -o c.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # compare b and c to identify non-determinism (no cmp in pwsh)
          if ((Get-FileHash b.exe).Hash -ne (Get-FileHash c.exe).Hash) {
            Write-Error 'build did not converge to the fixpoint'
            exit 1
          }

          # hand the fixpoint binary to the test job
          New-Item -ItemType Directory -Path artifact -Force | Out-Null
          Copy-Item c.exe artifact/mach.exe -Force

      - name: upload fixpoint result
        uses: actions/upload-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact/mach.exe
          if-no-files-found: error
          retention-days: 1

  test-windows:
    name: test ${{ matrix.target }}
    needs: build-windows
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: download the fixpoint result
        uses: actions/download-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact

      - name: self test
        run: |
          ./artifact/mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./artifact/mach.exe test .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  release-windows:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
            seed: mach-*-x86_64-windows.zip
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          $seed = Join-Path $env:RUNNER_TEMP 'seed'
          New-Item -ItemType Directory -Path $seed -Force | Out-Null
          gh release download -R $env:GITHUB_REPOSITORY -p $env:SEED -D $seed
          $zip = Get-ChildItem -Path $seed -Filter $env:SEED | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $seed -Force
          Add-Content -Path $env:GITHUB_PATH -Value $seed

      - name: build release fixpoint
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mach.exe build . --profile release -o a.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./a.exe build . --profile release -o b.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./b.exe build . --profile release -o c.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # the opt=2 compiler must rebuild itself byte-identically (no cmp in pwsh)
          if ((Get-FileHash b.exe).Hash -ne (Get-FileHash c.exe).Hash) {
            Write-Error 'release build did not converge to the fixpoint'
            exit 1
          }

      - name: self test
        run: |
          ./c.exe test .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  # the integration matrix is data-driven from int/targets.conf: this setup job
  # turns the pr-cadence rows into the include list the integration job matrixes
  # over, so adding a target is one targets.conf row and no workflow edit.
  int-matrix:
    name: int matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - uses: actions/checkout@v6
      - id: gen
        run: echo "include=$(bash int/lib/ci-matrix.sh pr)" >> "$GITHUB_OUTPUT"

  # one job over every pr-cadence leg: build a from-source compiler on the leg's
  # host (seeded by the matching release), then run the int/ suite for the target.
  # the riscv64 leg runs its fixtures under qemu-user; every other leg runs native.
  integration:
    name: int ${{ matrix.target }}
    needs: int-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.int-matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@v6

      - name: install qemu-user
        if: matrix.runmode == 'qemu'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: build the from-source compiler
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          case "${{ runner.arch }}" in
            X64)   seed='mach-*-x86_64-linux.tar.gz' ;;
            ARM64) seed='mach-*-aarch64-linux.tar.gz' ;;
            *) echo "::error::unsupported host arch ${{ runner.arch }}"; exit 1 ;;
          esac
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$seed" -D "$tmp"
          tar -xzf "$tmp"/$seed -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach
          mach dep pull
          mach build . -o m

      # the seed lands on PATH via GITHUB_PATH, which only takes effect in later
      # steps, so the fetch and the build are separate (as in the build lanes).
      - name: fetch released mach (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: mach-*-x86_64-windows.zip
        run: |
          $seed = Join-Path $env:RUNNER_TEMP 'seed'
          New-Item -ItemType Directory -Path $seed -Force | Out-Null
          gh release download -R $env:GITHUB_REPOSITORY -p $env:SEED -D $seed
          $zip = Get-ChildItem -Path $seed -Filter $env:SEED | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $seed -Force
          Add-Content -Path $env:GITHUB_PATH -Value $seed

      - name: build the from-source compiler (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mach.exe build . -o m.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: run integration suite
        shell: bash
        run: bash int/run.sh --target ${{ matrix.target }} ./m

  # debug-info verification: build a from-source compiler (seeded by the matching
  # release), then run dbg/verify.sh, which builds the dbg/ fixtures with and without
  # -g and machine-checks the emitted DWARF — llvm-dwarfdump --verify, an addr2line
  # PC->file:line round-trip, and the additive-only byte-identity guard (-g must not
  # perturb the loaded program). the validators read the target object regardless of
  # the host ISA, so this one x86_64 linux runner covers every shipped ELF ISA. the
  # macho/coff lanes are staged pending their producers (see dbg/README.md).
  debuginfo:
    name: debuginfo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install debug-info validators
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y llvm binutils

      - name: build the from-source compiler
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: mach-*-x86_64-linux.tar.gz
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach
          mach dep pull
          mach build . -o m

      - name: verify debug info
        run: bash dbg/verify.sh ./m
