name: CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

# every native host gets two checks: "build <target>" proves the most recent
# release (the seed) builds the project to a self-host fixpoint. "test <target>"
# reuses that fixpoint compiler to run the in-source corpus.
jobs:
  build-linux:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
            seed: mach-*-x86_64-linux.tar.gz
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
            seed: mach-*-aarch64-linux.tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: pull dependencies
        run: mach dep pull

      - name: build fixpoint
        run: |
          set -euo pipefail

          mach dep pull
          mach build . -o a
          ./a build . -o b
          ./b build . -o c

          # compare b and c to identify non-determinism
          if ! cmp -s b c; then
            echo "::error::build did not converge to the fixpoint"
            exit 1
          fi

          # hand the fixpoint binary to the test job
          mkdir -p artifact
          cp c artifact/mach

      - name: upload fixpoint result
        uses: actions/upload-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact/mach
          if-no-files-found: error
          retention-days: 1

  test-linux:
    name: test ${{ matrix.target }}
    needs: build-linux
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: download the fixpoint result
        uses: actions/download-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact

      - name: self test
        run: |
          set -euo pipefail
          ./artifact/mach dep pull
          ./artifact/mach test .

  build-windows:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
            seed: mach-*-x86_64-windows.zip
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          $seed = Join-Path $env:RUNNER_TEMP 'seed'
          New-Item -ItemType Directory -Path $seed -Force | Out-Null
          gh release download -R $env:GITHUB_REPOSITORY -p $env:SEED -D $seed
          $zip = Get-ChildItem -Path $seed -Filter $env:SEED | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $seed -Force
          Add-Content -Path $env:GITHUB_PATH -Value $seed

      - name: pull dependencies
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: build fixpoint
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mach.exe build . -o a.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./a.exe build . -o b.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./b.exe build . -o c.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # compare b and c to identify non-determinism (no cmp in pwsh)
          if ((Get-FileHash b.exe).Hash -ne (Get-FileHash c.exe).Hash) {
            Write-Error 'build did not converge to the fixpoint'
            exit 1
          }

          # hand the fixpoint binary to the test job
          New-Item -ItemType Directory -Path artifact -Force | Out-Null
          Copy-Item c.exe artifact/mach.exe -Force

      - name: upload fixpoint result
        uses: actions/upload-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact/mach.exe
          if-no-files-found: error
          retention-days: 1

  test-windows:
    name: test ${{ matrix.target }}
    needs: build-windows
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: download the fixpoint result
        uses: actions/download-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact

      - name: self test
        run: |
          ./artifact/mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./artifact/mach.exe test .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
