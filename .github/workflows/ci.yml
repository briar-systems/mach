name: CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  full-build:
    name: Full Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch released mach (build seed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R ${{ github.repository }} -p mach -D /usr/local/bin
          chmod +x /usr/local/bin/mach

      - name: Build the compiler
        run: |
          set -euo pipefail
          # the released mach builds the current source — the standard self-hosting
          # build (no external bootstrap chain on the PR path).
          mach build .
          test -x out/linux/bin/mach || { echo "::error::mach build . produced no binary"; exit 1; }

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R ${{ github.repository }} -p mach -D /usr/local/bin
          chmod +x /usr/local/bin/mach

      - name: Test corpus
        run: mach test .

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch released mach (build seed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R ${{ github.repository }} -p mach -D /usr/local/bin
          chmod +x /usr/local/bin/mach

      - name: Install wine
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64
          command -v wine >/dev/null || sudo ln -s "$(command -v wine64)" /usr/local/bin/wine

      - name: Build the compiler
        run: mach build .

      - name: Cross-compile the windows target
        run: out/linux/bin/mach build . --target windows

      - name: Run the integration suites
        run: |
          set -euo pipefail
          fail=0
          for t in .github/tests/*/run.sh; do
            echo "::group::$t"
            if ! bash "$t" "$GITHUB_WORKSPACE/out/linux/bin/mach"; then
              echo "::error::integration suite failed: $t"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

  # native windows lane: the released mach.exe builds the source on real windows
  # and the freshly-built compiler runs the in-source test suite, spawning each
  # test as a native child process (CreateProcess). this exercises the real OS,
  # not the wine emulation the integration lane uses for the cross-compile path.
  windows:
    name: Windows (native)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch released mach.exe (build seed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R ${{ github.repository }} -p mach-x86_64-windows.zip -D $env:RUNNER_TEMP
          Expand-Archive -Path "$env:RUNNER_TEMP/mach-x86_64-windows.zip" -DestinationPath "$env:RUNNER_TEMP/seed" -Force
          Add-Content -Path $env:GITHUB_PATH -Value "$env:RUNNER_TEMP/seed"

      - name: Build the compiler (native)
        run: |
          mach.exe build .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "out/windows/bin/mach.exe")) {
            Write-Error "mach build . produced no binary"
            exit 1
          }

      - name: Test corpus (native)
        run: |
          out/windows/bin/mach.exe test .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
