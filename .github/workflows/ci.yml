name: CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

# every native host gets three checks: "build <target>" proves the most recent
# release (the seed) builds the project to a self-host fixpoint. "test <target>"
# reuses that fixpoint compiler to run the in-source corpus. "release <target>"
# repeats the fixpoint under the opt=2 release profile so -O2 codegen
# regressions surface on PRs, not only at tag time.
jobs:
  build-linux:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
            seed: mach-*-x86_64-linux.tar.gz
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
            seed: mach-*-aarch64-linux.tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build fixpoint
        run: |
          set -euo pipefail

          mach dep pull
          mach build . -o a
          ./a build . -o b
          ./b build . -o c

          # compare b and c to identify non-determinism
          if ! cmp -s b c; then
            echo "::error::build did not converge to the fixpoint"
            exit 1
          fi

          # hand the fixpoint binary to the test job
          mkdir -p artifact
          cp c artifact/mach

      - name: upload fixpoint result
        uses: actions/upload-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact/mach
          if-no-files-found: error
          retention-days: 1

  test-linux:
    name: test ${{ matrix.target }}
    needs: build-linux
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: download the fixpoint result
        uses: actions/download-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact

      - name: self test
        run: |
          set -euo pipefail
          chmod +x artifact/mach
          ./artifact/mach dep pull
          ./artifact/mach test .

  release-linux:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runs-on: ubuntu-latest
            seed: mach-*-x86_64-linux.tar.gz
          - target: aarch64-linux
            runs-on: ubuntu-24.04-arm
            seed: mach-*-aarch64-linux.tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build release fixpoint
        run: |
          set -euo pipefail
          mach dep pull
          mach build . --profile release -o a
          ./a build . --profile release -o b
          ./b build . --profile release -o c

          # the opt=2 compiler must rebuild itself byte-identically
          if ! cmp -s b c; then
            echo "::error::release build did not converge to the fixpoint"
            exit 1
          fi

      - name: self test
        run: |
          set -euo pipefail
          ./c test .

  # riscv64-linux is cross-compile-only: mach-std has no riscv64 runtime, so the
  # compiler cannot be built or self-tested for it. this lane builds a riscv64-capable
  # compiler from the PR source (the released seed predates the backend), cross-compiles
  # the freestanding fixture, byte-verifies the linked RV64 ELF with the llvm tools, and
  # runs it under qemu-riscv64 to assert its inline-asm `exit` exit code (the fixture
  # emits `ecall` now that the riscv64 inline-asm assembler has landed).
  cross-riscv64:
    name: cross riscv64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install llvm tools and qemu
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y llvm qemu-user

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: mach-*-x86_64-linux.tar.gz
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build riscv64-capable compiler from source
        run: |
          set -euo pipefail
          mach dep pull
          mach build . -o m

      - name: cross-compile, byte-verify, and run the rv64 fixture
        run: bash test/riscv64/verify.sh "$PWD/m"

  # aarch64-linux is cross-compile-only on this x86_64 host: the integer-heavy self-host
  # never spills floats, so the spilled-float load/store encoding (#1737) has no other
  # e2e guard. this lane builds an aarch64-capable compiler from the PR source,
  # cross-compiles the freestanding fixture (forty simultaneously-live f64s forcing an FP
  # spill), asserts the spilled float encodes as scalar-FP ldr/str Dd, and runs it under
  # qemu-aarch64 to assert its inline-asm `exit` exit code.
  cross-arm64:
    name: cross aarch64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install llvm tools and qemu
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y llvm qemu-user

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: mach-*-x86_64-linux.tar.gz
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build aarch64-capable compiler from source
        run: |
          set -euo pipefail
          mach dep pull
          mach build . -o m

      - name: cross-compile, byte-verify, and run the arm64 fixture
        run: bash test/arm64/verify.sh "$PWD/m"

  # the Darwin triples are cross-compile-only here: the compiler cannot run on the
  # Linux host, so it is not built or self-tested for darwin. this lane builds a
  # Mach-O-capable compiler from the PR source, cross-compiles the freestanding
  # fixtures for x86_64-darwin and aarch64-darwin, and byte-verifies both the static
  # (LC_UNIXTHREAD) and the dynamic (LC_LOAD_DYLINKER + LC_LOAD_DYLIB + dyld bind +
  # LC_DYSYMTAB) executables with the llvm tools, including the ad-hoc
  # LC_CODE_SIGNATURE + CodeDirectory each carries. there is no execution step:
  # Darwin binaries cannot run on the Linux host (on-Mac exec is the macOS lane).
  cross-darwin:
    name: cross darwin (macho)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install llvm tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y llvm

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: mach-*-x86_64-linux.tar.gz
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build macho-capable compiler from source
        run: |
          set -euo pipefail
          mach dep pull
          mach build . -o m

      - name: cross-compile and byte-verify the macho fixtures
        run: bash test/macho/verify.sh "$PWD/m"

  # the freestanding/raw flat-image build path (#1616): builds a compiler from the
  # PR source, builds the minimal os=freestanding, of=raw x86_64 fixture (which
  # links straight from the in-memory codegen images, no per-module .o), confirms
  # the output is a container-free flat binary, then mmaps the position-independent
  # image and runs it to assert its computed exit code. needs only a C compiler for
  # the loader harness - no llvm, no qemu.
  cross-freestanding:
    name: cross freestanding (raw)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: mach-*-x86_64-linux.tar.gz
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build a compiler from source
        run: |
          set -euo pipefail
          mach dep pull
          mach build . -o m

      - name: build and run the freestanding raw flat image
        run: bash test/freestanding/verify.sh "$PWD/m"

  # `mach test .` scopes test collection to the current project (#1556): builds a
  # compiler from the PR source, then runs a fixture whose project imports an
  # in-tree dependency, each carrying a `test`. asserts the default `--list` shows
  # only the project's test and `--include-deps` adds the dependency's. `--list`
  # links nothing, so no runtime or qemu is needed.
  test-scope:
    name: test scope (#1556)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: mach-*-x86_64-linux.tar.gz
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download -R "$GITHUB_REPOSITORY" -p "$SEED" -D "$tmp"
          tar -xzf "$tmp"/$SEED -C /usr/local/bin mach
          chmod +x /usr/local/bin/mach

      - name: build a compiler from source
        run: |
          set -euo pipefail
          mach dep pull
          mach build . -o m

      - name: verify mach test scopes to the current project
        run: bash test/test-scope/verify.sh "$PWD/m"

  build-windows:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
            seed: mach-*-x86_64-windows.zip
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          $seed = Join-Path $env:RUNNER_TEMP 'seed'
          New-Item -ItemType Directory -Path $seed -Force | Out-Null
          gh release download -R $env:GITHUB_REPOSITORY -p $env:SEED -D $seed
          $zip = Get-ChildItem -Path $seed -Filter $env:SEED | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $seed -Force
          Add-Content -Path $env:GITHUB_PATH -Value $seed

      - name: build fixpoint
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mach.exe build . -o a.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./a.exe build . -o b.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./b.exe build . -o c.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # compare b and c to identify non-determinism (no cmp in pwsh)
          if ((Get-FileHash b.exe).Hash -ne (Get-FileHash c.exe).Hash) {
            Write-Error 'build did not converge to the fixpoint'
            exit 1
          }

          # hand the fixpoint binary to the test job
          New-Item -ItemType Directory -Path artifact -Force | Out-Null
          Copy-Item c.exe artifact/mach.exe -Force

      - name: upload fixpoint result
        uses: actions/upload-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact/mach.exe
          if-no-files-found: error
          retention-days: 1

  test-windows:
    name: test ${{ matrix.target }}
    needs: build-windows
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: download the fixpoint result
        uses: actions/download-artifact@v4
        with:
          name: mach-${{ matrix.target }}
          path: artifact

      - name: self test
        run: |
          ./artifact/mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./artifact/mach.exe test .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  release-windows:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            runs-on: windows-latest
            seed: mach-*-x86_64-windows.zip
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: fetch released mach
        env:
          GH_TOKEN: ${{ github.token }}
          SEED: ${{ matrix.seed }}
        run: |
          $seed = Join-Path $env:RUNNER_TEMP 'seed'
          New-Item -ItemType Directory -Path $seed -Force | Out-Null
          gh release download -R $env:GITHUB_REPOSITORY -p $env:SEED -D $seed
          $zip = Get-ChildItem -Path $seed -Filter $env:SEED | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath $seed -Force
          Add-Content -Path $env:GITHUB_PATH -Value $seed

      - name: build release fixpoint
        run: |
          mach.exe dep pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          mach.exe build . --profile release -o a.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./a.exe build . --profile release -o b.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./b.exe build . --profile release -o c.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # the opt=2 compiler must rebuild itself byte-identically (no cmp in pwsh)
          if ((Get-FileHash b.exe).Hash -ne (Get-FileHash c.exe).Hash) {
            Write-Error 'release build did not converge to the fixpoint'
            exit 1
          }

      - name: self test
        run: |
          ./c.exe test .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
