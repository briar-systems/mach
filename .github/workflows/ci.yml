name: CI

on:
  pull_request:
    branches: [dev]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-19
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100

      - name: Build bootstrap compiler
        run: make cmach

      - name: Run tests
        run: make test

  build:
    name: Full Build (4-stage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-19
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100

      - name: Full 4-stage build
        run: make full
