[project]
id = "exp_libcall"
name = "exp_libcall"
version = "0.0.0"
src = "src"
target = "darwin-aarch64"
out = "out/{target}/{name}{ext}"
obj = "out/{target}/obj"

[target.darwin-aarch64]
isa = "aarch64"
os  = "darwin"
abi = "aapcs64"

[profile.debug]
opt = 0

# the import is pinned to this exact install name, so it must also appear in libs.
[bin.exp_libcall]
entry = "main.mach"
libs = ["/usr/lib/libSystem.B.dylib"]
