[project]
id = "exp_raw"
name = "exp_raw"
version = "0.0.0"
src = "src"
target = "darwin-aarch64"
out = "out/{target}/{name}{ext}"
obj = "out/{target}/obj"

[target.darwin-aarch64]
isa = "aarch64"
os  = "darwin"
abi = "aapcs64"

[profile.debug]
opt = 0

# libSystem drives the dynamic-exec writer (a real LC_LOAD_DYLIB dyld can resolve).
[bin.exp_raw]
entry = "main.mach"
libs = ["/usr/lib/libSystem.B.dylib"]
