[project]
id = "exp_static"
name = "exp_static"
version = "0.0.0"
src = "src"
target = "darwin-aarch64"
out = "out/{target}/{name}{ext}"
obj = "out/{target}/obj"

[target.darwin-aarch64]
isa = "aarch64"
os  = "darwin"
abi = "aapcs64"

[profile.debug]
opt = 0

# no libs: the linker takes the static emit_exec path (LC_UNIXTHREAD, no dyld).
[bin.exp_static]
entry = "main.mach"
