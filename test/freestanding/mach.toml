[project]
id = "rawprobe"
name = "rawprobe"
version = "0.0.0"
src = "src"
target = "freestanding-x86_64"
out = "out/{target}/{name}{ext}"
obj = "out/{target}/obj"

[target.freestanding-x86_64]
isa = "x86_64"
os  = "freestanding"
abi = "sysv64"

[profile.debug]
opt = 0

[bin.rawprobe]
entry = "main.mach"
