[project]
id = "machorebase"
name = "machorebase"
version = "0.0.0"
src = "src"
target = "darwin-aarch64"
out = "out/{target}/{name}{ext}"
obj = "out/{target}/obj"

[target.darwin-x86_64]
isa = "x86_64"
os  = "darwin"
abi = "sysv64"

[target.darwin-aarch64]
isa = "aarch64"
os  = "darwin"
abi = "aapcs64"

[profile.debug]
opt = 0

[bin.machorebase]
entry = "main.mach"
