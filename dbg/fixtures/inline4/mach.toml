[project]
id = "inline4fix"
version = "0.0.0"
src = "src"
out = "out/{target.name}/{profile.name}"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[target.linux-riscv64]
isa = "riscv64"
os  = "linux"
abi = "lp64"

[profile.debug]
opt = 0
debug = false
simd = "scalarize"

[profile.release]
opt = 2
debug = false
simd = "scalarize"

[artifact.inline4fix]
kind = "bin"
entry = "main.mach"
out = "bin/inline4fix"
targets = ["*"]
link = []
need = []

[dep.mach-std]
git = "https://github.com/briar-systems/mach-std"
ref = "branch/main"
