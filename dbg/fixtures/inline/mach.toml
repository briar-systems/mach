[project]
id = "inlinefix"
name = "inlinefix"
description = "debug-info fixture"
version = "0.0.0"
src = "src"
out = "out/{target.name}/{profile.name}"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[target.linux-riscv64]
isa = "riscv64"
os  = "linux"
abi = "lp64"

[profile.debug]
opt = 0

[profile.release]
opt = 2

[artifact.inlinefix]
kind = "bin"
entry = "main.mach"
out = "bin/inlinefix"
targets = ["*"]

[dep.mach-std]
git = "https://github.com/briar-systems/mach-std"
ref = "branch/main"
