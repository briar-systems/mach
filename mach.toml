[project]
id = "mach"
name = "Mach Compiler"
version = "2.5.8"
src = "src"
dep = "dep"
target = "native"
out = "out/{target}/{profile}/bin/{name}{ext}"
obj = "out/{target}/{profile}/obj"
ir  = "out/{target}/{profile}/ir"
asm = "out/{target}/{profile}/asm"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.windows]
isa  = "x86_64"
os   = "windows"
abi  = "win64"
ext  = ".exe"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[bin.mach]
entry = "main.mach"

# debug is declared first so a flagless `mach build .` selects it (opt = 0, the
# fixpoint-stable bootstrap pipeline); `mach build . --release` selects release.
[profile.debug]
opt = 0

[profile.release]
opt = 2

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
# tracks mach-std main (>= v0.13.0, clone-spawn os.spawn). the v1.7 DECOUPLE
# freeze ended post-collapse and the std has stabilized; deps pin to branch/main.
ref = "branch/main"
