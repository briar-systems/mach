[project]
id = "mach"
name = "Mach Compiler"
version = "0.6.8"
src = "src"
target = "native"

[dependencies]
std = "std"

[targets.linux]
triple = "x86_64-pc-linux-gnu"
entrypoint = "main.mach"
artifacts = "out/imach/linux"
output = "out/bin/imach"
mode = "executable"
debug = true
optimize = true
emit-ast = true
emit-ir = true
emit-asm = true
emit-object = true
no-pie = false

[targets.darwin]
triple = "x86_64-apple-darwin"
entrypoint = "main.mach"
artifacts = "out/imach/darwin"
output = "out/bin/imach"
mode = "executable"
debug = true
optimize = true
emit-ast = true
emit-ir = true
emit-asm = true
emit-object = true
no-pie = false

[targets.windows]
triple = "x86_64-pc-windows-msvc"
entrypoint = "main.mach"
artifacts = "out/imach/windows"
output = "out/bin/imach.exe"
mode = "executable"
debug = true
optimize = true
emit-ast = true
emit-ir = true
emit-asm = true
emit-object = true
no-pie = false
link = ["kernel32.lib", "shell32.lib"]
