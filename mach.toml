[project]
id      = "mach"
name    = "Mach Compiler"
version = "0.7.1"
dir_src = "src"
dir_dep = "dep"
dir_out = "out"
target  = "native"

[targets.linux]
platform   = "linux"
arch       = "x86_64"
mode       = "executable"
entrypoint = "main.mach"
artifacts  = "linux"
binary     = "linux/bin/%s"

[deps.mach-std]
type = "remote"
path = "https://github.com/octalide/mach-std"
version = "branch/main"
