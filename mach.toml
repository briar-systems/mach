[project]
name = "std"
version = "0.1.0"
target-name = "std"
default-target = "all"
entrypoint = "runtime.mach"

[directories]
src-dir = "src"
dep-dir = "dep"
lib-dir = "lib"
out-dir = "out"

[targets.native]
target = "x86_64-pc-linux-gnu"
opt-level = 2
build-library = true

[runtime]
runtime = "std.runtime"

[modules]
std = "std"
