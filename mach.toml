[project]
id = "mach"
name = "Mach Compiler"
version = "1.3.1"
dir_src = "src"
dir_dep = "dep"
dir_out = "out"
target = "native"

[targets.linux]
os = "linux"
isa = "x86_64"
abi = "sysv64"
mode = "executable"
entrypoint = "main.mach"
artifacts = "linux"
binary = "linux/bin/mach"

[targets.windows]
os = "windows"
isa = "x86_64"
abi = "win64"
mode = "executable"
entrypoint = "main.mach"
artifacts = "windows"
binary = "windows/bin/mach.exe"
libs = ["kernel32.dll"]

[deps.mach-std]
type = "remote"
path = "https://github.com/octalide/mach-std"
version = "branch/dev"
