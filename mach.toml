[project]
id = "mach"
name = "Mach Compiler"
version = "2.8.0"
src = "src"
dep = "dep"
target = "native"
out = "out/{target}/{profile}/bin/{name}{ext}"
obj = "out/{target}/{profile}/obj"
ir  = "out/{target}/{profile}/ir"
asm = "out/{target}/{profile}/asm"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

# cross-compile-only: mach-std has no riscv64 linux runtime yet, so the compiler
# itself cannot be built for this target. it composes and selects so the backend
# can be byte-verified against a freestanding fixture (see test/riscv64).
[target.linux-riscv64]
isa = "riscv64"
os  = "linux"
abi = "lp64"

[target.windows]
isa  = "x86_64"
os   = "windows"
abi  = "win64"
ext  = ".exe"

[profile.debug]
opt = 0

[profile.release]
opt = 2

[bin.mach]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
ref = "branch/main"
