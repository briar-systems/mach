[project]
name = "mach"
version = "0.2.0"
src = "src"
target = "native"

[dependencies]
std = "std"

[targets.linux]
triple = "x86_64-pc-linux-gnu"
entrypoint = "main.mach"
artifacts = "out/imach/linux"
out = "out/bin/imach"
opt-level = 2
emit-ast = true
emit-ir = true
emit-asm = true
emit-object = true
build-library = false
no-pie = false

[targets.darwin]
triple = "x86_64-apple-darwin"
entrypoint = "main.mach"
artifacts = "out/imach/darwin"
out = "out/bin/imach"
opt-level = 2
emit-ast = true
emit-ir = true
emit-asm = true
emit-object = true
build-library = false
no-pie = false

[targets.windows]
triple = "x86_64-pc-windows-msvc"
entrypoint = "main.mach"
artifacts = "out/imach/windows"
out = "bin/imach.exe"
opt-level = 2
emit-ast = true
emit-ir = true
emit-asm = true
emit-object = true
build-library = false
no-pie = false
