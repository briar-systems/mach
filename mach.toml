[project]
id = "mach"
name = "Mach Compiler"
version = "2.2.0"
src = "src"
dep = "dep"
target = "native"
out = "out/{target}/bin/{name}{ext}"
obj = "out/{target}/obj"
ir  = "out/{target}/ir"
asm = "out/{target}/asm"

[target.linux]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.windows]
isa  = "x86_64"
os   = "windows"
abi  = "win64"
ext  = ".exe"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[bin.mach]
entry = "main.mach"

[deps.mach-std]
git = "https://github.com/octalide/mach-std"
# tracks mach-std main (>= v0.13.0, clone-spawn os.spawn). the v1.7 DECOUPLE
# freeze ended post-collapse and the std has stabilized; deps pin to branch/main.
ref = "branch/main"
