[project]
id = "mach"
name = "Mach Compiler"
description = "The Mach compiler"
version = "3.1.0"
src = "src"
out = "out/{target.name}/{profile.name}"

[target.linux-x86_64]
isa = "x86_64"
os  = "linux"
abi = "sysv64"

[target.linux-arm64]
isa = "aarch64"
os  = "linux"
abi = "aapcs64"

[target.linux-riscv64]
isa = "riscv64"
os  = "linux"
abi = "lp64"

[target.windows-x86_64]
isa  = "x86_64"
os   = "windows"
abi  = "win64"

[target.darwin-x86_64]
isa = "x86_64"
os  = "darwin"
abi = "sysv64"

[target.darwin-aarch64]
isa = "aarch64"
os  = "darwin"
abi = "aapcs64"

[profile.debug]
opt = 0

[profile.release]
opt = 2

[artifact.mach]
kind = "bin"
entry = "main.mach"
out = "bin/mach"
targets = ["*"]

[dep.mach-std]
git = "https://github.com/briar-systems/mach-std"
ref = "branch/main"
